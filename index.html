<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>My PWA</title>
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>
  <header class="header">
    <div class="header-content">
      
    </div>
  </header>
  <main>
    <section class="account-summary">
      <div class="account-card">
        <h2>Preferred BANKING 優越理財</h2>
        <p>綜合戶口</p>
        <p>368-547550-888</p>
        <p>港幣 42.82</p>
      </div>
      <div class="card">
        <h2>恒生 MMPOWER World Mastercard</h2>
        <p>5408-0620-0567-9862</p>
        <p>港幣 66,439.32 DR</p>
      </div>
    </section>
    <section class="actions">
      <h3>常用功能</h3>
      <div class="action-buttons">
        <button>查看 e-Statement</button>
        <button>手機提款</button>
        <button>繳付賬單</button>
      </div>
    </section>
    <section class="promotions">
      <h3>本月優惠</h3>
      <img src="promotion.png" alt="Promotion">
    </section>
  </main>
  <footer>
    <div class="footer-nav">
      <button>首頁</button>
      <button>轉賬及付款</button>
      <button>投資</button>
      <button>信用卡</button>
    </div>
  </footer>
  <script src="sw.js"></script>
</body>
</html>
